<style>
:root{color-scheme:dark;
 --bg:#0a0d12;--bg2:#0d1117;--nav:#0b0f16;
 --panel:rgba(255,255,255,.026);--panel2:rgba(255,255,255,.05);
 --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.12);
 --ink:#eaeef5;--ink2:#aeb7c6;--mut:#727d8e;--navmut:#8b95a5;
 --accent:#34d399;--acc-d:#1f9e73;--acc-soft:rgba(52,211,153,.12);
 --pos:#34d399;--neg:#f0776b;--warn:#e6b450;
 /* classes d'actifs = nuances de vert + neutres (fini l'arc-en-ciel) */
 --etf:#34d399;--crypto:#6ee7b7;--av:#1f9e73;--scpi:#0f6b4f;--gold:#5eead4;--cash:#3a424f;--immo:#2dd4bf;--per:#14b8a6;--cto:#a7f3d0;
 --rev:#34d399;--dep:#f0776b;--net:#7c8798;
 --r:15px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 background:radial-gradient(60% 45% at 12% -8%,rgba(52,211,153,.06),transparent 60%),radial-gradient(50% 40% at 100% 0%,rgba(52,211,153,.035),transparent 55%),var(--bg);
 background-attachment:fixed;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
.side{width:224px;flex:none;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent);border-right:1px solid var(--line);color:var(--ink);display:flex;flex-direction:column;padding:20px 15px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
.brand .logo{width:35px;height:35px;border-radius:11px;background:linear-gradient(150deg,var(--accent),var(--acc-d));display:flex;align-items:center;justify-content:center;color:#04140d;box-shadow:0 6px 18px rgba(52,211,153,.25)}
.brand b{font-size:15px;font-weight:700;letter-spacing:-.01em}.brand small{display:block;font-size:10.5px;color:var(--navmut);margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--ink2);font-size:13.5px;font-weight:500;cursor:pointer;border:none;background:none;text-align:left;width:100%;position:relative;transition:.15s}
.nav-item svg{width:18px;height:18px;flex:none;opacity:.8}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.nav-item.on{background:var(--acc-soft);color:var(--ink);font-weight:600}
.nav-item.on svg{opacity:1;color:var(--accent)}
.nav-item.on::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--accent)}
.side .tools{margin-top:auto;display:flex;flex-direction:column;gap:6px;padding-top:14px}
.tbtn{font-size:11.5px;font-weight:600;color:var(--ink2);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer;text-align:left;transition:.15s}
.tbtn:hover{background:rgba(255,255,255,.09);color:var(--ink)}
.tbtn.danger:hover{background:rgba(240,119,107,.14);border-color:rgba(240,119,107,.3);color:var(--neg)}
.side .foot{font-size:10px;color:var(--mut);padding:12px 4px 0;line-height:1.5;border-top:1px solid var(--line);margin-top:12px}
.main{flex:1;min-width:0;padding:28px 32px 56px;max-width:1320px}
.head{margin-bottom:22px}.head h1{font-size:23px;font-weight:750;letter-spacing:-.025em}.head p{font-size:13px;color:var(--mut);margin-top:5px}
.grid{display:grid;gap:15px}.kpis{grid-template-columns:repeat(4,1fr)}.two{grid-template-columns:1fr 1fr}
@media(max-width:1000px){.kpis{grid-template-columns:repeat(2,1fr)}.two{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;transition:.18s}
.card:hover{border-color:var(--line2)}
.lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);font-weight:600}
.kpi .val{font-size:25px;font-weight:780;letter-spacing:-.035em;margin-top:10px;font-variant-numeric:tabular-nums}
.kpi .meta{font-size:12px;color:var(--mut);margin-top:6px}.kpi .meta.up{color:var(--pos);font-weight:600}.kpi .meta.down{color:var(--neg);font-weight:600}
.card h3{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}.card .h-sub{font-size:11.5px;color:var(--mut);margin-bottom:15px}
.cv{position:relative;height:260px}.cv.sm{height:230px}
.section{display:none}.section.show{display:block}
.sech{font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;color:var(--mut);margin:28px 2px 12px}
.bar{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:11px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc-d),var(--accent));border-radius:99px}
table.tb{width:100%;border-collapse:collapse;font-size:13px}
table.tb th{text-align:left;color:var(--mut);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
table.tb td{padding:5px 8px;border-bottom:1px solid var(--line)}
table.tb td.r,table.tb th.r{text-align:right;font-variant-numeric:tabular-nums}
table.tb tr.tot td{font-weight:750;border-top:1px solid var(--line2);border-bottom:none;background:rgba(255,255,255,.02)}
table.tb tr.pick td{background:var(--acc-soft);color:#a7f3d0;font-weight:700}
.inp{width:100%;border:1px solid transparent;background:rgba(255,255,255,.045);border-radius:8px;padding:7px 9px;font:inherit;font-size:13px;color:var(--ink)}
.inp::placeholder{color:var(--mut)}
.inp:hover{border-color:var(--line2)}.inp:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.07);box-shadow:0 0 0 3px rgba(52,211,153,.14)}
.inp.num{text-align:right;font-variant-numeric:tabular-nums}
.inp.mo{width:90px;padding:6px 7px;font-size:12px}.inp.tt{font-weight:600}
select.inp{cursor:pointer}select.inp option{background:#12171f;color:var(--ink)}textarea.inp{resize:vertical;min-height:38px;line-height:1.4}
.scroll{overflow-x:auto;margin:0 -4px;padding:0 4px}
.rm{border:none;background:none;color:var(--mut);cursor:pointer;font-size:16px;line-height:1;padding:2px 6px;border-radius:6px}.rm:hover{background:rgba(240,119,107,.14);color:var(--neg)}
.add{margin-top:12px;border:1px dashed var(--line2);background:none;color:var(--ink2);border-radius:10px;padding:10px 14px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}.add:hover{border-color:var(--accent);color:var(--accent);background:var(--acc-soft)}
.ecart{font-size:11px;font-weight:650;padding:2px 8px;border-radius:99px}.ec-pos{background:var(--acc-soft);color:var(--pos)}.ec-neg{background:rgba(240,119,107,.13);color:var(--neg)}
.note{font-size:11.5px;color:var(--mut);margin-top:10px}
.linkbtn{background:none;border:none;color:var(--accent);font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 2px}
.signal{background:var(--acc-soft);border:1px solid rgba(52,211,153,.25);color:#8ff0c4;font-size:12.5px;font-weight:600;border-radius:10px;padding:10px 13px;margin-bottom:12px}
.signal.refuge{background:rgba(230,180,80,.12);border-color:rgba(230,180,80,.3);color:var(--warn)}
.perf{display:flex;gap:28px;flex-wrap:wrap}.perf .v{font-size:20px;font-weight:750;margin-top:4px;font-variant-numeric:tabular-nums}
.ob{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.obh{display:flex;align-items:center;gap:11px;padding:14px 17px;cursor:pointer;user-select:none;transition:.15s}
.obh:hover{background:rgba(255,255,255,.03)}.obh .ti{font-weight:600;font-size:14px}
.dot{width:10px;height:10px;border-radius:99px;flex:none}
.badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:99px;margin-left:auto}
.b-cours{background:var(--acc-soft);color:var(--accent)}.b-pause{background:rgba(255,255,255,.06);color:var(--mut)}.b-fait{background:rgba(52,211,153,.18);color:#8ff0c4}
.chev{width:16px;height:16px;color:var(--mut);transition:transform .2s}.ob.open .chev{transform:rotate(90deg)}
.obbody{display:none;padding:4px 17px 17px;border-top:1px solid var(--line)}.ob.open .obbody{display:block}
.fld{margin-top:12px}.fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:600;margin-bottom:5px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.oblist{display:flex;flex-direction:column;gap:12px}
.obactions{display:flex;align-items:center;gap:10px;margin-top:14px}
.fg{margin-bottom:12px}.fg .top{display:flex;align-items:center;gap:10px}
@media(max-width:760px){
 .app{flex-direction:column}.side{width:auto;height:auto;position:static;flex-direction:row;align-items:center;padding:12px;overflow-x:auto}
 .brand{padding:0 12px 0 4px}.brand small{display:none}.nav{flex-direction:row;margin-left:8px;gap:6px}.nav-item span{display:none}
 .nav-item.on::before{display:none}.side .tools,.side .foot{display:none}.main{padding:18px 14px 40px}
}
tr.recon td{background:rgba(52,211,153,.05)}
.recbox{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
/* ===================== v3 — vivant : bleu/violet, UNE couleur par classe, contraste corrigé ===================== */
:root{
 --bg:#080b16;--bg2:#0b1224;--nav:#0b1224;
 --panel:rgba(255,255,255,.05);--panel2:rgba(255,255,255,.08);
 --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.15);
 --ink:#eef2fb;--ink2:#c8d2ea;--mut:#93a0c0;--navmut:#93a0c0;
 --accent:#4d8dff;--acc-d:#3a6fe0;--acc-soft:rgba(77,141,255,.16);
 --pos:#3ee79a;--neg:#ff6b6b;--warn:#f5a623;
 /* couleurs distinctes et coordonnées (fini le tout-vert indistinct) */
 --cash:#7c8aa8;--etf:#4d8dff;--av:#3ee79a;--crypto:#f5a623;--scpi:#9b7cff;--gold:#eab308;--immo:#22d3ee;--per:#f472b6;--cto:#a3e635;
 --rev:#3ee79a;--dep:#ff6b6b;--net:#9b7cff;
 --glow:0 0 24px rgba(77,141,255,.22);
}
body{background:
  radial-gradient(50% 40% at 16% -6%,rgba(77,141,255,.20),transparent 55%),
  radial-gradient(46% 40% at 102% 6%,rgba(155,124,255,.18),transparent 55%),
  radial-gradient(60% 50% at 60% 112%,rgba(56,189,248,.08),transparent 60%),
  linear-gradient(160deg,#060912,#0a1024 55%,#070a16);background-attachment:fixed}
.side{background:rgba(255,255,255,.02)}
.brand .logo{background:linear-gradient(140deg,#4d8dff,#38bdf8);box-shadow:0 6px 20px rgba(77,141,255,.5)}
.nav-item.on{background:linear-gradient(90deg,rgba(77,141,255,.28),rgba(77,141,255,.05));color:#cfe0ff;box-shadow:inset 0 0 0 1px rgba(77,141,255,.35),0 0 24px rgba(77,141,255,.16)}
.nav-item.on::before{display:none}.nav-item.on svg{color:var(--accent)}
.card,.ob,.fg{background:linear-gradient(158deg,rgba(255,255,255,.06),rgba(255,255,255,.015));border-color:var(--line);box-shadow:0 14px 40px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(14px)}
.card:hover,.ob:hover{border-color:rgba(255,255,255,.16)}
.obh:hover{background:rgba(255,255,255,.03)}
/* contraste : libellés + sous-titres plus clairs (avant : gris trop sombre, illisible) */
.lbl,.card .h-sub,.h-sub,.note{color:#93a0c0}
table.tb th{color:#9aa7c6}
.dot{width:11px;height:11px;box-shadow:0 0 9px currentColor}
.kpi .val{font-size:26px}
/* Héros patrimoine (Synthèse) */
.section[data-s="synthese"] .kpis{grid-template-columns:1.45fr 1fr;align-items:stretch}
.section[data-s="synthese"] .kpis .card.kpi:first-child{grid-row:1 / span 3;display:flex;flex-direction:column;justify-content:center;
 background:linear-gradient(150deg,rgba(77,141,255,.18),rgba(77,141,255,.03) 46%,rgba(255,255,255,.012));border-color:rgba(77,141,255,.28);box-shadow:0 14px 44px rgba(0,0,0,.36),var(--glow),inset 0 1px 0 rgba(255,255,255,.06)}
.section[data-s="synthese"] .kpis .card.kpi:first-child .lbl{font-size:11px}
.section[data-s="synthese"] .kpis .card.kpi:first-child .val{font-size:44px;letter-spacing:-.045em;margin-top:14px}
.section[data-s="synthese"] .kpis .card.kpi:first-child .meta{font-size:13px;margin-top:10px}
@media(max-width:1000px){.section[data-s="synthese"] .kpis{grid-template-columns:1fr 1fr}.section[data-s="synthese"] .kpis .card.kpi:first-child{grid-row:auto;grid-column:1 / -1}}
/* boutons primaires -> dégradé bleu + halo */
.add[style*="var(--accent)"]{background:linear-gradient(140deg,#4d8dff,#3a6fe0)!important;color:#fff!important;box-shadow:0 8px 26px rgba(77,141,255,.5),inset 0 1px 0 rgba(255,255,255,.3)}
.signal{box-shadow:var(--glow)}
.badge.b-cours,.st.go{box-shadow:0 0 14px rgba(77,141,255,.16)}
/* Export/Import retirés (données en base cloud) */
#bExport,#bImport,#fImport{display:none!important}
.cls-ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:none;transition:transform .15s}.cls-ic svg{width:18px;height:18px;stroke-width:2}
.obh:hover .cls-ic{transform:scale(1.07)}
.card.kpi{position:relative;overflow:hidden}.kpi-ic{position:absolute;top:15px;right:15px;width:34px;height:34px;z-index:2}.kpi-ic svg{width:17px;height:17px}
.hero-spark{position:absolute;left:0;right:0;bottom:0;height:58%;opacity:.5;pointer-events:none;z-index:0}
.section[data-s="synthese"] .kpis .card.kpi:first-child>.lbl,.section[data-s="synthese"] .kpis .card.kpi:first-child>.val,.section[data-s="synthese"] .kpis .card.kpi:first-child>.meta{position:relative;z-index:1}
.mini-ic{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-right:8px;vertical-align:-3px}.mini-ic svg{width:15px;height:15px;stroke-width:2}
.section[data-s="synthese"] .kpis .card.kpi:first-child .val{background:linear-gradient(100deg,#f2f6ff,#8fd0ff 55%,#5ff0c0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
/* ================================================================================================= */
</style>
</head>

function migrate(s){
 if(!s.assets)s.assets=clone(SEED.assets);
 s.assets=s.assets.map(a=>a.lines?a:{key:a.key,name:a.name,cible:a.cible,cvar:a.cvar,lines:[{nom:a.name,val:a.val||0}]});
 s.assets.forEach(a=>{if(a._open===undefined)a._open=false;if(a.invest===undefined)a.invest=0;if(a.note===undefined)a.note="";if(!a.versements)a.versements=[];});
 if(s.cashNote===undefined)s.cashNote="";
 if(!s._noteInit){const e=s.assets.find(a=>a.key==="etf");if(e&&!e.note)e.note="Dual Momentum+ : chaque mois, prendre le support au plus haut momentum (cf. tableau ci-dessous).";const cr=s.assets.find(a=>a.key==="crypto");if(cr&&!cr.note)cr.note="Cible 60% BTC / 40% ETH (ETH : 75% staké). Acheter quand tu ne veux pas, jamais quand tu le veux. Achat le dimanche.";s._noteInit=true;}
 const cr=s.assets.find(a=>a.key==="crypto");
 if(cr&&(cr.lines.length===0||cr.lines.some(l=>l.qte===undefined)))cr.lines=clone(SEED.assets.find(a=>a.key==="crypto").lines);
 const sc=s.assets.find(a=>a.key==="scpi");
 if(sc&&sc.lines.length&&sc.lines.some(l=>l.qte===undefined)){sc.lines=sc.lines.map(l=>({nom:l.nom,qte:1,cours:num(l.val)||num(l.cours)||0}));if(!sc.note)sc.note="Rendement ~9%/an. La rente (loyers) = revenu : enregistre-la dans le Budget. 1ers loyers vers août 2026.";}
 if(s._cashOpen===undefined)s._cashOpen=false;
 if(!s.etfMomentum)s.etfMomentum=clone(SEED.etfMomentum);
 if(!s.etfLog)s.etfLog=[];
 if(s.curM===undefined)s.curM=Math.max(0,new Date().getMonth()-1);
 if(!s.history)s.history=[];
 if(!s._mFix){const tgt=Math.max(0,new Date().getMonth()-1);s.curM=tgt;s.history=s.history.filter(h=>{const p=(h.ym||"").split("-");return !(p[0]==="2026"&&(+p[1]-1)>tgt);});s._mFix=true;}
 if(!s._mJun){s.curM=Math.min(11,new Date().getMonth());s.history=s.history.filter(h=>h.ym!=="2026-05");s._mJun=true;}
 if(!s._fevParts){s._fevParts=true;}
 if(!s._maiSeed){s._maiSeed=true;}
 if(!s._fevSeed){s._fevSeed=true;}
 if(!s._avrFix){s._avrFix=true;}
 if(!s.fgoals)s.fgoals=[];s.fgoals.forEach(g=>{if(g.unite===undefined)g.unite="€";if(g.echeance===undefined)g.echeance="";});
 if(s.focusMois===undefined)s.focusMois="";
 if(!s._fgInit){s.fgoals=(s.fgoals||[]).filter(g=>num(g.cible)||num(g.actuel));if(!s.fgoals.length)s.fgoals.push({name:"Argent",cible:10000,actuel:1000});s._fgInit=true;}
 if(s.revenus&&s.revenus[0]&&!s.revenus[0].subs)s.revenus=s.revenus.map(p=>({name:p.name,_open:false,subs:[{name:p.name,m:p.m||P([])}]}));
 if(s.depenses&&s.depenses[0]&&!s.depenses[0].subs)s.depenses=s.depenses.map(p=>({name:p.name,cvar:p.cvar||"--mut",_open:false,subs:[{name:p.name,m:p.m||P([])}]}));
 if(!s.objs)s.objs=clone(SEED.objs);
 s.objs=s.objs.map(o=>("titre"in o)?o:{titre:o.axe||"Objectif",etat:o.actuel||"",action:"",resultat:o.vise||o.resultat||"",statut:o.statut||"En cours",_open:false});

function num(v){const n=parseFloat(String(v).replace(",","."));return isNaN(n)?0:n;}
function fmtE(n){return Math.round(n).toLocaleString("fr-FR")+" €";}
function fmtE2(n){return n.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function lineVal(a,l){return (a.key==="crypto"||a.key==="scpi")?num(l.qte)*num(l.cours):num(l.val);}
function assetVal(a){return a.lines.reduce((s,l)=>s+lineVal(a,l),0);}
function assetInvest(a){return num(a.invest||0)+(a.versements||[]).reduce((s,v)=>s+num(v.montant),0);}
function posteTot(p,m){return p.subs.reduce((s,x)=>s+num(x.m[m]),0);}
function grp(g){return g==="rev"?state.revenus:state.depenses;}
function ymNow(){return "2026-"+String(Math.min(11,Math.max(0,state.curM||0))+1).padStart(2,"0");}
function ymLabel(ym){const p=ym.split("-");return MONTHS[(+p[1])-1].toLowerCase()+" "+p[0];}

function compute(){
 const cashTotal=state.comptes.reduce((a,c)=>a+num(c.solde),0);
 const total=cashTotal+state.assets.reduce((s,a)=>s+assetVal(a),0);
 const mkv=(name,val,cible,cvar)=>{const pct=total?val/total*100:0;return{name,val,cible:num(cible),cvar,pct,ecart:pct-num(cible)};};
 const assetsView=state.assets.map(a=>{const val=assetVal(a),inv=assetInvest(a),v=mkv(a.name,val,a.cible,a.cvar);v.invest=inv;v.pv=val-inv;v.pvpct=inv>0?(val-inv)/inv*100:0;return v;});
 const cashView=mkv("Cash (Livret + Courant)",cashTotal,state.cashCible,"--cash");
 const assets=[cashView,...assetsView];
 const investTotal=state.assets.reduce((s,a)=>s+assetInvest(a),0);
 const investValue=total-cashTotal;const pvTotal=investValue-investTotal;const pvPct=investTotal>0?pvTotal/investTotal*100:0;
 const rev=MONTHS.map((_,m)=>state.revenus.reduce((a,p)=>a+posteTot(p,m),0));
 const dep=MONTHS.map((_,m)=>state.depenses.reduce((a,p)=>a+posteTot(p,m),0));
 const net=MONTHS.map((_,m)=>rev[m]-dep[m]);
 let lastM=0;MONTHS.forEach((_,m)=>{if(rev[m]||dep[m])lastM=m;});
 const nb=lastM+1;
 const depCat=state.depenses.map(p=>{const t=MONTHS.reduce((a,_,m)=>a+posteTot(p,m),0);return{name:p.name,cvar:p.cvar,total:t,avg:t/nb};}).filter(x=>x.total>0);
 const revYear=rev.reduce((a,b)=>a+b,0),depYear=dep.reduce((a,b)=>a+b,0);
 const savMonthly=(revYear-depYear)/nb,savRate=revYear>0?(revYear-depYear)/revYear*100:0;
 const avgDep=depYear/nb,emMonths=avgDep>0?cashTotal/avgDep:0;
 const ymn=ymNow();const past=state.history.filter(h=>h.ym<ymn).sort((a,b)=>a.ym<b.ym?-1:1);
 const prevTotal=past.length?past[past.length-1].total:null;
 const varMonth=prevTotal!=null?total-prevTotal:null,varPct=prevTotal?((total-prevTotal)/prevTotal*100):null;
 return{cashTotal,assets,assetsView,cashView,total,investTotal,investValue,pvTotal,pvPct,rev,dep,net,depCat,lastM,nb,revYear,depYear,savMonthly,savRate,avgDep,emMonths,varMonth,varPct};
}
function snapshot(){const c=compute();const ym=ymNow();const parts={cash:c.cashTotal};state.assets.forEach((a,idx)=>{parts[a.key]=c.assetsView[idx].val;});const e=state.history.find(h=>h.ym===ym);if(e){e.total=c.total;e.parts=parts;}else state.history.push({ym,total:c.total,parts:parts});state.history.sort((a,b)=>a.ym<b.ym?-1:1);}
function momSignal(rows){
 if(!rows.length)return null;
 const oblig=rows.find(r=>/oblig/i.test(r.nom));const risky=rows.filter(r=>!/oblig/i.test(r.nom));
 let best=null;risky.forEach(r=>{if(best===null||num(r.perf)>num(best.perf))best=r;});
 if(!best)return oblig?{pick:oblig.nom,refuge:true,perf:num(oblig.perf)}:null;
 if(num(best.perf)<=0||(oblig&&num(best.perf)<=num(oblig.perf)))return{pick:(oblig||best).nom,refuge:true,perf:num((oblig||best).perf)};
 return{pick:best.nom,refuge:false,perf:num(best.perf)};
}

function histChart(id){const h=state.history.slice().sort((a,b)=>a.ym<b.ym?-1:1);mk(id,{type:"line",data:{labels:h.map(x=>ymLabel(x.ym)),datasets:[{data:h.map(x=>x.total),
 borderColor:(c)=>{const a=c.chart.chartArea;if(!a)return"#4d8dff";const g=c.chart.ctx.createLinearGradient(a.left,0,a.right,0);g.addColorStop(0,"#4d8dff");g.addColorStop(.55,"#38bdf8");g.addColorStop(1,"#3ee79a");return g;},
 borderWidth:3,
 backgroundColor:(c)=>{const a=c.chart.chartArea;if(!a)return"rgba(77,141,255,.15)";const g=c.chart.ctx.createLinearGradient(0,a.top,0,a.bottom);g.addColorStop(0,"rgba(77,141,255,.30)");g.addColorStop(.5,"rgba(56,189,248,.12)");g.addColorStop(1,"rgba(62,231,154,0)");return g;},
 fill:true,tension:.35,pointRadius:4,pointBackgroundColor:"#0d1117",pointBorderColor:"#38bdf8",pointBorderWidth:2}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>" "+fmtE(x.raw)}}},scales:{x:gx,y:gy({callback:v=>(v/1000)+"k"})}}});}
function heroSpark(id){const el=document.getElementById(id);if(!el)return;const h=state.history.slice().sort((a,b)=>a.ym<b.ym?-1:1);mk(id,{type:"line",data:{labels:h.map(x=>ymLabel(x.ym)),datasets:[{data:h.map(x=>x.total),borderColor:(c)=>{const a=c.chart.chartArea;if(!a)return"#4d8dff";const g=c.chart.ctx.createLinearGradient(a.left,0,a.right,0);g.addColorStop(0,"#4d8dff");g.addColorStop(.55,"#38bdf8");g.addColorStop(1,"#3ee79a");return g;},borderWidth:2.5,backgroundColor:(c)=>{const a=c.chart.chartArea;if(!a)return"rgba(77,141,255,.25)";const g=c.chart.ctx.createLinearGradient(0,a.top,0,a.bottom);g.addColorStop(0,"rgba(77,141,255,.40)");g.addColorStop(1,"rgba(62,231,154,0)");return g;},fill:true,tension:.4,pointRadius:0}]},options:{plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},layout:{padding:0}}});}
function buildCharts(t){
 const c=compute();
 if(t==="synthese"){heroSpark("cHistHero");}
 if(t==="patrimoine"){donut("cDonut",c);
   const hp=state.history.filter(h=>h.parts).sort((a,b)=>a.ym<b.ym?-1:1);
   const inv=state.assets.filter(a=>assetInvest(a)>0);
   mk("cPerf",{type:"line",data:{labels:hp.map(h=>ymLabel(h.ym)),datasets:inv.map(a=>{const iv=assetInvest(a);return {label:a.name,data:hp.map(h=>h.parts[a.key]!=null?+(((h.parts[a.key]-iv)/iv*100).toFixed(1)):null),borderColor:col(a.cvar),backgroundColor:col(a.cvar),tension:.3,pointRadius:3,borderWidth:2,fill:false,spanGaps:true};})},options:{plugins:{legend:lgT,tooltip:{callbacks:{label:x=>" "+x.dataset.label+" : "+(x.raw>=0?"+":"")+x.raw+"%"}}},scales:{x:gx,y:gy({callback:v=>v+"%"})}}});}
 if(t==="budget"){flow("cFlow",c);
   const cs=c.depCat.slice().sort((a,b)=>b.avg-a.avg);
   mk("cCats",{type:"doughnut",data:{labels:cs.map(x=>x.name),datasets:[{data:cs.map(x=>+x.avg.toFixed(0)),backgroundColor:cs.map(x=>col(x.cvar)),borderWidth:3,borderColor:"#0d1117"}]},options:{cutout:"58%",plugins:{legend:{position:"right",labels:{color:"#eef2fb",usePointStyle:true,boxWidth:10,padding:8,generateLabels:pctLabels}},tooltip:{callbacks:{label:x=>" "+fmtE(x.raw)+" / mois  ·  total an "+fmtE(cs[x.dataIndex].total)}}}}});}
 if(t==="historique"){
   const hs=state.history.slice().sort((a,b)=>a.ym<b.ym?-1:1);
   const labels=[],data=[];for(let k=1;k<hs.length;k++){labels.push(ymLabel(hs[k].ym));data.push(+(hs[k].total-hs[k-1].total).toFixed(0));}
   mk("cHistVar",{type:"bar",data:{labels:labels,datasets:[{data:data,backgroundColor:data.map(v=>v>=0?col("--rev"):col("--dep")),borderRadius:6,barPercentage:.6}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>" "+(x.raw>=0?"+":"")+fmtE(x.raw)}}},scales:{x:gx,y:gy({callback:v=>(v/1000)+"k"})}}});
   }
}
function show(t){tab=t;document.querySelectorAll(".nav-item").forEach(e=>e.classList.toggle("on",e.dataset.s===t));document.querySelectorAll(".section").forEach(e=>e.classList.toggle("show",e.dataset.s===t));destroyCharts();buildCharts(t);}

function inp(kind,i,m,val,cls,type){
 const a='data-k="'+kind+'"'+(i!=null?' data-i="'+i+'"':'')+(m!=null?' data-m="'+m+'"':'');
 if(type==="select"){const opts=["En cours","En pause","Atteint"].map(o=>'<option'+(o===val?' selected':'')+'>'+o+'</option>').join("");return '<select class="inp '+(cls||'')+'" '+a+'>'+opts+'</select>';}
 if(type==="textarea")return '<textarea class="inp '+(cls||'')+'" '+a+'>'+esc(val||"")+'</textarea>';
 return '<input class="inp '+(cls||'')+'" '+a+' type="'+(type||"text")+'" value="'+esc(val)+'"'+(type==="number"?' step="0.01"':'')+'>';
}
function aInp(at,val,cls,type){let a=Object.keys(at).map(k=>'data-'+k+'="'+at[k]+'"').join(" ");return '<input class="inp '+(cls||"")+'" '+a+' type="'+(type||"text")+'"'+(type==="number"?' step="any"':'')+' value="'+esc(val)+'">';}
function badge(st){const cl=/cours/i.test(st)?"b-cours":/pause/i.test(st)?"b-pause":"b-fait";return '<span class="badge '+cl+'">'+esc(st)+'</span>';}
function dotcol(st){return /cours/i.test(st)?col("--av"):/pause/i.test(st)?col("--crypto"):col("--accent");}
function pvtxt(pv,pvpct,inv){if(inv<=0)return '<span style="color:var(--mut)">—</span>';const c=pv>=0?"#34d399":"#f0776b";return '<span style="color:'+c+';font-weight:700">'+(pv>=0?"+":"")+fmtE(pv)+' ('+(pvpct>=0?"+":"")+pvpct.toFixed(1)+'%)</span>';}

 const lines=a.lines.map((l,m)=>{
   const ex=cols.map(c=>'<td'+(c.t==="number"?' class="r"':'')+'>'+aInp({k:"asset-lf",i:i,m:m,f:c.k},l[c.k]!=null?l[c.k]:"",c.t==="number"?"num mo":"",c.t)+'</td>').join("");
   const vc=calc?'<td class="r" style="font-weight:650">'+fmtE2(lineVal(a,l))+'</td>':'<td class="r" style="width:150px">'+inp("asset-lval",i,m,l.val!=null?l.val:0,"num","number")+'</td>';
   return '<tr><td>'+inp("asset-lnom",i,m,l.nom,"tt")+'</td>'+ex+vc+'<td><button class="rm" data-k="asset-ldel" data-i="'+i+'" data-m="'+m+'">×</button></td></tr>';
 }).join("");
 let mom="";
 if(a.key==="etf"){
   const sig=momSignal(state.etfMomentum);
   const rows=state.etfMomentum.map((r,m)=>'<tr'+(sig&&sig.pick===r.nom?' class="pick"':'')+'><td>'+inp("mom-nom",m,null,r.nom,"tt")+'</td><td>'+inp("mom-isin",m,null,r.isin)+'</td><td class="r" style="width:120px">'+inp("mom-perf",m,null,r.perf,"num mo","number")+'</td><td><button class="rm" data-k="mom-del" data-i="'+m+'">×</button></td></tr>').join("");
   mom='<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line)"><div style="font-size:13px;font-weight:700;margin-bottom:3px">Dual Momentum+</div><div class="h-sub">Le support au plus haut momentum = celui à prendre. Calcul auto.</div>'
     +(sig?'<div class="signal'+(sig.refuge?" refuge":"")+'">'+(sig.refuge?"⚠ Refuge : ":"✓ Signal du mois : ")+esc(sig.pick)+' ('+sig.perf.toFixed(1)+'%)</div>':'')
     +'<div class="scroll"><table class="tb"><thead><tr><th>Support</th><th>ISIN</th><th class="r">Momentum %</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'
     +'<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="add" data-k="mom-add" style="margin-top:12px">+ Ajouter un support</button><button class="add" data-k="etf-snap" style="margin-top:12px;border-style:solid;background:var(--accent);color:#fff;border-color:var(--accent)">📸 Enregistrer ce relevé</button></div>'
     +(state.etfLog&&state.etfLog.length?('<div style="margin-top:14px"><div class="lbl">Relevés ETF enregistrés</div>'+state.etfLog.map((e,li)=>'<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)"><span style="color:var(--mut);min-width:92px">'+new Date(e.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"})+'</span><span style="font-weight:650">'+(e.refuge?"⚠ ":"")+esc(e.pick)+'</span><span style="color:var(--mut)">'+(e.perf!=null?e.perf.toFixed(1)+"%":"")+'</span><button class="rm" data-k="etf-log-del" data-i="'+li+'" style="margin-left:auto">×</button></div>').join("")+'</div>'):'')
     +'</div>';
 }
 const vers=a.versements||[];
 const versTot=vers.reduce((s,vv)=>s+num(vv.montant),0);
 const versRows=vers.map((vv,vi)=>'<tr><td>'+aInp({k:"vers-date",i:i,m:vi},vv.date||"","","")+'</td><td class="r" style="width:130px">'+aInp({k:"vers-montant",i:i,m:vi},vv.montant||0,"num mo","number")+'</td><td><button class="rm" data-k="vers-del" data-i="'+i+'" data-m="'+vi+'">×</button></td></tr>').join("");
 const op=a._open?" open":"";
 return '<div class="ob'+op+'" style="margin-top:12px"><div class="obh" data-k="asset-toggle" data-i="'+i+'"><span class="cls-ic" style="color:'+col(a.cvar)+';background:linear-gradient(140deg,'+col(a.cvar)+'33,'+col(a.cvar)+'12);border:1px solid '+col(a.cvar)+'55;box-shadow:0 0 18px '+col(a.cvar)+'33,inset 0 1px 0 rgba(255,255,255,.12)">'+(ICONCLS[a.key]||ICONCLS._)+'</span><span class="ti">'+esc(a.name)+'</span><span style="margin-left:auto;font-weight:750;font-variant-numeric:tabular-nums">'+fmtE2(tot)+'</span>'+(view.invest>0?'<span class="ecart '+(view.pvpct>=0?"ec-pos":"ec-neg")+'">'+(view.pvpct>=0?"+":"")+view.pvpct.toFixed(1)+'%</span>':'')+CHEV+'</div>'
   +'<div class="obbody"><button class="add" data-k="open-wiz" data-mode="asset:'+a.key+'" style="margin:0 0 4px 0;border-style:solid;background:var(--accent);color:#fff;border-color:var(--accent)">📸 Faire le point de cette classe</button><div class="row"><div class="fld" style="max-width:160px"><label>Investi de base (€)</label>'+inp("asset-invest",i,null,a.invest,"num","number")+'</div>'
   +'<div class="fld"><label>Plus-value</label><div style="padding-top:7px">'+pvtxt(view.pv,view.pvpct,view.invest)+'</div></div></div>'
   +'<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)"><div style="font-size:12.5px;font-weight:700">Versements / DCA</div><div class="h-sub">Chaque apport est ajouté à ton investi.</div>'+(vers.length?'<div class="scroll"><table class="tb"><thead><tr><th>Date</th><th class="r">Montant</th><th></th></tr></thead><tbody>'+versRows+'</tbody></table></div>':'')+'<button class="add" data-k="vers-add" data-i="'+i+'">+ Ajouter un versement</button><div style="margin-top:8px;font-size:12.5px"><b>Total investi : '+fmtE2(view.invest)+'</b> <span style="color:var(--mut)">(base '+fmtE(num(a.invest))+' + DCA '+fmtE(versTot)+')</span></div></div>'
   +'<div class="fld"><label>Notes / stratégie</label>'+inp("asset-note",i,null,a.note||"","","textarea")+'</div>'
   +'<div class="scroll" style="margin-top:12px"><table class="tb"><thead>'+head+'</thead><tbody>'+lines+'</tbody></table></div>'
   +'<button class="add" data-k="asset-ladd" data-i="'+i+'">+ Ajouter une ligne</button>'+mom+'</div></div>';
}

function posteBlock(g,p,i,visM){
 const op=p._open?" open":"";
 const yearTot=MONTHS.reduce((s,_,m)=>s+posteTot(p,m),0);
 const moHead=visM.map(m=>'<th class="r">'+MONTHS[m]+'</th>').join("");
 const subs=p.subs.map((sub,si)=>'<tr'+(sub.rec?' class="recon"':'')+'><td>'+aInp({k:"sub-name",g:g,i:i,s:si},sub.name,"tt")+'</td>'+visM.map(m=>'<td class="r">'+aInp({k:"sub-m",g:g,i:i,s:si,m:m},sub.m[m]||0,"num mo","number")+'</td>').join("")+'<td class="r">'+fmtE(sub.m.reduce((a,x)=>a+num(x),0))+'</td><td class="r"><input type="checkbox" class="recbox" data-k="sub-rec" data-g="'+g+'" data-i="'+i+'" data-s="'+si+'"'+(sub.rec?" checked":"")+' title="Récurrent : recopié chaque mois via le bouton ↻"></td><td><button class="rm" data-k="sub-del" data-g="'+g+'" data-i="'+i+'" data-s="'+si+'">×</button></td></tr>').join("");
 const totr='<tr class="tot"><td>Total '+esc(p.name)+'</td>'+visM.map(m=>'<td class="r">'+fmtE(posteTot(p,m))+'</td>').join("")+'<td class="r">'+fmtE(yearTot)+'</td><td></td><td></td></tr>';
 const dotc=g==="rev"?col("--rev"):col(p.cvar||"--dep");
 return '<div class="ob'+op+'" style="margin-top:10px"><div class="obh" data-k="poste-toggle" data-g="'+g+'" data-i="'+i+'"><span class="cls-ic" style="color:'+dotc+';background:linear-gradient(140deg,'+dotc+'33,'+dotc+'12);border:1px solid '+dotc+'55;box-shadow:0 0 16px '+dotc+'33,inset 0 1px 0 rgba(255,255,255,.12)">'+budIcon(p.name)+'</span><span class="ti">'+esc(p.name)+'</span><span style="margin-left:auto;font-weight:750;font-variant-numeric:tabular-nums">'+fmtE(yearTot)+'</span>'+CHEV+'</div>'
   +'<div class="obbody"><div class="fld" style="max-width:300px"><label>Nom du poste</label>'+aInp({k:"poste-name",g:g,i:i},p.name,"tt")+'</div>'
   +'<div class="scroll" style="margin-top:12px"><table class="tb"><thead><tr><th>Sous-partie</th>'+moHead+'<th class="r">Total an</th><th class="r" title="Récurrent : recopié chaque mois">↻</th><th></th></tr></thead><tbody>'+subs+totr+'</tbody></table></div>'
   +'<button class="add" data-k="sub-add" data-g="'+g+'" data-i="'+i+'">+ Ajouter une sous-partie</button></div></div>';
}

function fgoalCard(fg,i){
 const cible=num(fg.cible),actuel=num(fg.actuel);
 const pctp=cible>0?Math.min(100,actuel/cible*100):0;
 const done=cible>0&&actuel>=cible;
 return '<div class="card fg"><div class="top">'+inp("fgoal-name",i,null,fg.name,"tt")+(done?'<span class="badge b-fait" style="margin-left:10px">✅ Atteint</span>':'')+'<button class="rm" data-k="fgoal-del" data-i="'+i+'" style="margin-left:auto">×</button></div>'
   +'<div style="display:flex;justify-content:space-between;font-size:13px;margin-top:12px"><span style="font-weight:700">'+actuel.toLocaleString("fr-FR")+' / '+cible.toLocaleString("fr-FR")+'</span><span style="color:var(--mut)">'+pctp.toFixed(0)+'%</span></div>'
   +'<div class="bar"><i style="width:'+pctp+'%"></i></div>'
   +'<div class="row" style="margin-top:8px"><div class="fld" style="max-width:180px"><label>Actuel</label>'+inp("fgoal-actuel",i,null,fg.actuel,"num","number")+'</div>'
   +'<div class="fld" style="max-width:180px"><label>Visé</label>'+inp("fgoal-cible",i,null,fg.cible,"num","number")+'</div></div></div>';
}

function render(){
 const c=compute();
 document.getElementById("nav").innerHTML=TABS.map(([s,l])=>'<button class="nav-item" data-s="'+s+'">'+IC[s]+'<span>'+l+'</span></button>').join("");
 document.querySelectorAll(".nav-item").forEach(b=>b.onclick=()=>show(b.dataset.s));

 const curM=Math.min(11,state.curM||0);const WIN=6;
 const start=showAllMonths?0:Math.max(0,curM-WIN+1);
 const visM=[];for(let m=start;m<=curM;m++)visM.push(m);
 const prevBtn=start>0?'<button class="linkbtn" data-k="toggle-months">'+(showAllMonths?"▾ Masquer les mois précédents":"▸ Voir les mois précédents ("+start+")")+'</button>':'';
 const revBlocks=state.revenus.map((p,i)=>posteBlock("rev",p,i,visM)).join("");
 const depBlocks=state.depenses.map((p,i)=>posteBlock("dep",p,i,visM)).join("");
 const ymn=ymNow();
 const curY=2026,curMo=Math.min(11,state.curM||0);
 const allYm=[];for(let mm=0;mm<=curMo;mm++)allYm.push(curY+"-"+String(mm+1).padStart(2,"0"));
 const presentYm={};state.history.forEach(h=>presentYm[h.ym]=1);
 const missingYm=allYm.filter(y=>!presentYm[y]);
 const histRows=state.history.slice().sort((a,b)=>a.ym<b.ym?-1:1).map(h=>{const isc=h.ym===ymn;const editable=histEdit&&!isc;return '<tr><td>'+ymLabel(h.ym)+(isc?' <span style="color:var(--mut);font-size:11px">(en cours)</span>':'')+'</td><td class="r" style="width:170px">'+(editable?('<input class="inp num" data-k="hist-total" data-ym="'+h.ym+'" type="number" step="0.01" value="'+h.total+'">'):('<span style="font-weight:650">'+fmtE(h.total)+'</span>'))+'</td><td>'+(editable?'<button class="rm" data-k="hist-del" data-ym="'+h.ym+'">×</button>':'')+'</td></tr>';}).join("");
 const histAdd=(histEdit&&missingYm.length)?'<select class="inp" data-k="hist-add" style="max-width:220px;margin-top:12px"><option value="">+ Ajouter un mois…</option>'+missingYm.map(y=>'<option value="'+y+'">'+ymLabel(y)+'</option>').join("")+'</select>':'';
 const CLSord=[["cash","Cash","--cash"]].concat(state.assets.map(a=>[a.key,a.name,a.cvar]));
 const hDesc=state.history.slice().sort((a,b)=>a.ym<b.ym?1:-1);
 const lossClasses=c.assetsView.filter(a=>a.invest>0&&a.pv<0);
 const totalCible=state.assets.reduce((s,a)=>s+num(a.cible),0)+num(state.cashCible);
 const isShownT=(a,i)=>c.assetsView[i].val>0||num(a.cible)>0||a._tgt;
 const tgtShown=state.assets.map((a,i)=>({a,i})).filter(x=>isShownT(x.a,x.i));
 const tgtHidden=state.assets.map((a,i)=>({a,i})).filter(x=>!isShownT(x.a,x.i));
 const actKeys=["etf","av","cto"];
 const actIdx=actKeys.map(k=>state.assets.findIndex(a=>a.key===k)).filter(i=>i>=0);
 const actPct=actIdx.reduce((s,i)=>s+c.assetsView[i].pct,0);
 const actVal=actIdx.reduce((s,i)=>s+c.assetsView[i].val,0);
 const stratRows=tgtShown.filter(x=>!actKeys.includes(x.a.key));

document.getElementById("root").addEventListener("change",e=>{
 const t=e.target;if(!t.dataset||!t.dataset.k)return;
 const k=t.dataset.k,i=t.dataset.i!=null?+t.dataset.i:null,m=t.dataset.m!=null?+t.dataset.m:null,s=t.dataset.s!=null?+t.dataset.s:null,g=t.dataset.g;
 const v=t.type==="number"?num(t.value):t.value;
 switch(k){
  case"asset-cible":state.assets[i].cible=v;break;
  case"cible-actions":state.cibleActions=v;break;
  case"asset-invest":state.assets[i].invest=v;break;
  case"asset-note":state.assets[i].note=v;break;
  case"cash-note":state.cashNote=v;break;
  case"vers-date":state.assets[i].versements[m].date=v;break;
  case"vers-montant":state.assets[i].versements[m].montant=v;break;
  case"asset-lnom":state.assets[i].lines[m].nom=v;break;
  case"asset-lval":state.assets[i].lines[m].val=v;break;
  case"asset-lf":state.assets[i].lines[m][t.dataset.f]=(t.dataset.f==="isin"?t.value:num(t.value));break;
  case"mom-nom":state.etfMomentum[i].nom=v;break;
  case"mom-isin":state.etfMomentum[i].isin=v;break;
  case"mom-perf":state.etfMomentum[i].perf=v;break;
  case"cashCible":state.cashCible=v;break;
  case"compte-name":state.comptes[i].name=v;break;
  case"compte-bank":state.comptes[i].bank=v;break;
  case"compte-role":state.comptes[i].role=v;break;
  case"compte-solde":state.comptes[i].solde=v;break;
  case"poste-name":grp(g)[i].name=v;break;
  case"sub-name":grp(g)[i].subs[s].name=v;break;
  case"sub-m":grp(g)[i].subs[s].m[m]=v;break;
  case"sub-rec":grp(g)[i].subs[s].rec=t.checked;break;
  case"fgoal-name":state.fgoals[i].name=v;break;
  case"fgoal-cible":state.fgoals[i].cible=v;break;
  case"fgoal-actuel":state.fgoals[i].actuel=v;break;
  case"fgoal-unite":state.fgoals[i].unite=v;break;
  case"fgoal-echeance":state.fgoals[i].echeance=v;break;
  case"focus-mois":state.focusMois=v;break;
  case"obj-titre":state.objs[i].titre=v;break;
  case"obj-etat":state.objs[i].etat=v;break;
  case"obj-action":state.objs[i].action=v;break;
  case"obj-resultat":state.objs[i].resultat=v;break;
  case"obj-statut":state.objs[i].statut=v;break;
  case"obj-prio":state.objs[i].prio=v;break;
  case"cible-add":if(t.value!=="")state.assets[+t.value]._tgt=true;break;
  case"hist-total":{const he=state.history.find(h=>h.ym===t.dataset.ym);if(he)he.total=num(t.value);break;}
  case"hist-add":if(t.value){state.history.push({ym:t.value,total:0});}break;
  default:return;
 }
 const LIGHT=["obj-titre","obj-etat","obj-action","obj-resultat","obj-statut","poste-name","sub-name","compte-name","compte-bank","compte-role","asset-note","cash-note","asset-lnom","mom-nom","mom-isin","fgoal-name","fgoal-unite","fgoal-echeance","focus-mois"];
 if(LIGHT.includes(k)){save();}else{refresh();}
});

document.getElementById("root").addEventListener("click",e=>{
 const el=e.target.closest("[data-k]");if(!el)return;
 if(el.tagName==="INPUT"||el.tagName==="SELECT"||el.tagName==="TEXTAREA")return;
 const k=el.dataset.k,i=el.dataset.i!=null?+el.dataset.i:null,s=el.dataset.s!=null?+el.dataset.s:null,g=el.dataset.g;
 if(k==="obj-toggle"){state.objs[i]._open=!state.objs[i]._open;save();el.closest(".ob").classList.toggle("open");return;}
 if(k==="asset-toggle"){state.assets[i]._open=!state.assets[i]._open;save();el.closest(".ob").classList.toggle("open");return;}
 if(k==="cash-toggle"){state._cashOpen=!state._cashOpen;save();el.closest(".ob").classList.toggle("open");return;}
 if(k==="cibles-toggle"){state._ciblesOpen=!state._ciblesOpen;save();el.closest(".ob").classList.toggle("open");return;}
 if(k==="poste-toggle"){grp(g)[i]._open=!grp(g)[i]._open;save();el.closest(".ob").classList.toggle("open");return;}
 if(k==="hist-toggle"){const he=state.history.find(h=>h.ym===el.dataset.ym);if(he)he._open=!he._open;save();el.closest(".ob").classList.toggle("open");return;}
 if(k==="hist-edit-toggle"){histEdit=!histEdit;render();return;}
 if(k==="open-wiz"){openWiz(el.dataset.mode);return;}
 if(k==="close-month"){const cm=state.curM||0;if(cm>=11){alert("On est en décembre — l'année suivante arrivera avec la version hébergée.");return;}if(confirm("Tu as fini de remplir "+MONTHS[cm]+" ? On enregistre et on passe à "+MONTHS[cm+1]+".")){snapshot();state.curM=cm+1;save();render();}return;}
 if(k==="fill-rec"){const cm=state.curM||0;if(cm<=0){alert("Pas de mois précédent à recopier (on est sur le 1er mois).");return;}let n=0;[state.revenus,state.depenses].forEach(gr=>gr.forEach(p=>p.subs.forEach(sub=>{if(sub.rec){sub.m[cm]=num(sub.m[cm-1]);n++;}})));if(n===0){alert("Aucune ligne marquée « récurrent ». Coche la case ↻ sur tes lignes fixes (loyer, box, mobile, mutuelle...) puis reclique.");return;}refresh();alert(n+" ligne(s) récurrente(s) recopiée(s) sur "+MONTHS[cm]+" depuis "+MONTHS[cm-1]+".");return;}
 if(k==="toggle-months"){showAllMonths=!showAllMonths;render();return;}
 let did=true;
 switch(k){
  case"asset-ladd":state.assets[i].lines.push({nom:"Nouvelle ligne",val:0,qte:0,cours:0,isin:""});break;
  case"vers-add":state.assets[i].versements.push({date:new Date().toISOString().slice(0,10),montant:0});break;
  case"vers-del":state.assets[i].versements.splice(el.dataset.m!=null?+el.dataset.m:0,1);break;
  case"asset-ldel":state.assets[i].lines.splice(el.dataset.m!=null?+el.dataset.m:0,1);break;
  case"mom-add":state.etfMomentum.push({nom:"Nouveau support",isin:"",perf:0});break;
  case"mom-del":state.etfMomentum.splice(i,1);break;
  case"etf-snap":{const sg=momSignal(state.etfMomentum);state.etfLog.unshift({date:new Date().toISOString().slice(0,10),pick:sg?sg.pick:"—",perf:sg?sg.perf:0,refuge:sg?sg.refuge:false});break;}
  case"etf-log-del":state.etfLog.splice(i,1);break;
  case"compte-add":state.comptes.push({name:"Nouveau compte",bank:"",role:"—",solde:0});break;
  case"compte-del":state.comptes.splice(i,1);break;
  case"poste-add":grp(g).push(g==="rev"?{name:"Nouveau revenu",_open:true,subs:[{name:"Sous-partie",m:P([])}]}:{name:"Nouveau poste",cvar:"--mut",_open:true,subs:[{name:"Sous-partie",m:P([])}]});break;
  case"poste-del":grp(g).splice(i,1);break;
  case"sub-add":grp(g)[i].subs.push({name:"Nouvelle sous-partie",m:P([])});break;
  case"sub-del":grp(g)[i].subs.splice(s,1);break;
  case"fgoal-add":state.fgoals.push({name:"Nouvel objectif",cible:0,actuel:0});break;
  case"fgoal-del":state.fgoals.splice(i,1);break;
  case"obj-add":state.objs.push({titre:"Nouvel objectif",etat:"",action:"",resultat:"",statut:"En cours",_open:true});break;

  case"cible-del":state.assets[i]._tgt=false;state.assets[i].cible=0;break;

 }
 if(did)refresh();

document.getElementById("fImport").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=migrate(JSON.parse(r.result));refresh();}catch(err){alert("Fichier invalide");}};r.readAsText(f);};

let wizSteps=[],wizIdx=0;
function moisNow(){return new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"});}
function buildSteps(mode){const s=[];if(mode==="budget"){const cm=Math.min(11,state.curM||0);state.revenus.forEach((p,pi)=>p.subs.forEach((sub,si)=>s.push({title:"Revenu — "+p.name+(p.name!==sub.name?" › "+sub.name:""),fields:[{label:MONTHS[cm]+" (€)",get:()=>state.revenus[pi].subs[si].m[cm],set:v=>state.revenus[pi].subs[si].m[cm]=num(v)}]})));state.depenses.forEach((p,pi)=>p.subs.forEach((sub,si)=>s.push({title:p.name+" › "+sub.name,fields:[{label:MONTHS[cm]+" (€)",get:()=>state.depenses[pi].subs[si].m[cm],set:v=>state.depenses[pi].subs[si].m[cm]=num(v)}]})));return s;}
 const onlyKey=(mode&&mode.indexOf("asset:")===0)?mode.slice(6):null;
 const incCash=(!mode||mode==="patrimoine"||mode==="cash");
 const incAssets=(!mode||mode==="patrimoine"||onlyKey!=null);
 if(incAssets)state.assets.forEach((a,ai)=>{if(onlyKey&&a.key!==onlyKey)return;let pushed=0;if(a.key==="crypto"||a.key==="scpi"){const cols=ACOLS[a.key];a.lines.forEach((l,li)=>{if(!onlyKey&&lineVal(a,l)===0)return;pushed++;s.push({title:a.name+" — "+l.nom,fields:cols.map(c=>({label:c.l,get:()=>state.assets[ai].lines[li][c.k],set:v=>state.assets[ai].lines[li][c.k]=num(v)}))});});}else{a.lines.forEach((l,li)=>{if(!onlyKey&&num(l.val)===0)return;pushed++;s.push({title:a.name+" — "+l.nom,fields:[{label:"Valeur actuelle (€)",get:()=>state.assets[ai].lines[li].val,set:v=>state.assets[ai].lines[li].val=num(v)}]});});}if(onlyKey||pushed>0)s.push({title:a.name+" — Apport investi ce mois",fields:[{label:"Montant ajouté ce mois (€) — vide si rien",get:()=>state.assets[ai]._apport||"",set:v=>state.assets[ai]._apport=num(v)}]});});
 if(incCash)state.comptes.forEach((cp,ci)=>{if((mode==="patrimoine"||!mode)&&num(cp.solde)===0)return;s.push({title:"Compte — "+cp.name+(cp.bank?" ("+cp.bank+")":""),fields:[{label:"Solde actuel (€)",get:()=>state.comptes[ci].solde,set:v=>state.comptes[ci].solde=num(v)}]});});
 return s;}
function wizSave(){const st=wizSteps[wizIdx];if(!st)return;st.fields.forEach((f,fi)=>{const el=document.getElementById("wizf"+fi);if(el)f.set(el.value);});}
function renderWiz(){const st=wizSteps[wizIdx],n=wizSteps.length;document.getElementById("wizCard").innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><h3>Mise à jour — '+moisNow()+'</h3><button class="rm" data-wk="x">×</button></div><div class="h-sub">Étape '+(wizIdx+1)+' / '+n+'</div><div class="bar" style="margin-bottom:16px"><i style="width:'+((wizIdx+1)/n*100)+'%"></i></div><div style="font-weight:700;font-size:15px;margin-bottom:6px">'+esc(st.title)+'</div>'+st.fields.map((f,fi)=>'<div class="fld"><label>'+f.label+'</label><input id="wizf'+fi+'" class="inp num" type="number" step="any" value="'+esc(f.get())+'"></div>').join("")+'<div style="display:flex;gap:10px;margin-top:18px">'+(wizIdx>0?'<button class="add" data-wk="prev" style="margin:0;flex:1">← Précédent</button>':'')+'<button class="add" data-wk="next" style="margin:0;flex:2;border-style:solid;background:var(--accent);color:#fff;border-color:var(--accent)">'+(wizIdx===n-1?"✓ Terminer & enregistrer":"Suivant →")+'</button></div>';const f0=document.getElementById("wizf0");if(f0){f0.focus();f0.select();}}
function openWiz(mode){wizSteps=buildSteps(mode||"patrimoine");if(!wizSteps.length)return;wizIdx=0;document.getElementById("wiz").style.display="flex";renderWiz();}
function closeWiz(finish){wizSave();document.getElementById("wiz").style.display="none";if(finish){state.assets.forEach(a=>{if(num(a._apport)>0){if(!a.versements)a.versements=[];a.versements.push({date:new Date().toISOString().slice(0,10),montant:num(a._apport)});}a._apport=0;});snapshot();}else{state.assets.forEach(a=>{a._apport=0;});}save();render();}
document.getElementById("wiz").addEventListener("click",e=>{const b=e.target.closest("[data-wk]");if(!b){if(e.target.id==="wiz")closeWiz(false);return;}const wk=b.dataset.wk;if(wk==="x"){closeWiz(false);return;}wizSave();if(wk==="prev"){wizIdx=Math.max(0,wizIdx-1);renderWiz();}else{if(wizIdx>=wizSteps.length-1)closeWiz(true);else{wizIdx++;renderWiz();}}});
refresh();
</script>

<script>
(function(){

    #syncBar{position:fixed;bottom:12px;right:14px;z-index:60;background:#101729;color:#cdd6ea;font-size:11.5px;font-weight:600;border-radius:10px;padding:7px 12px;box-shadow:0 4px 14px rgba(16,24,40,.25);display:flex;align-items:center;gap:8px}

  `;
  document.head.appendChild(style);

  const gate=document.createElement("div");
  gate.id="authGate";
  gate.innerHTML=`<div class="box">
    <div class="logo" style="background:none;overflow:hidden;padding:0"><img src="icon-192.png" alt="PFM" style="width:100%;height:100%;object-fit:cover;display:block"></div>
    <h2>Dashboard finances</h2>
    <p class="sub">Connecte-toi pour accéder à tes données.</p>
    <form id="agForm" autocomplete="on">
    <label>Email</label><input id="agEmail" name="email" type="email" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false">

    <button class="main" id="agBtn" type="submit">Se connecter</button>
    </form>
    <div class="toggle" id="agToggle">Pas encore de compte ? Créer un compte</div>
    <div class="msg" id="agMsg"></div>
  </div>`;
  document.body.appendChild(gate);
  try{const _e=localStorage.getItem("dashfin_email");if(_e)$("agEmail").value=_e;}catch(e){}

  const syncBar=document.createElement("div");
  syncBar.id="syncBar";syncBar.style.display="none";
  syncBar.innerHTML=`<span class="d"></span><span id="syncTxt">Synchronisé</span> · <button id="agOut">Déconnexion</button>`;
  document.body.appendChild(syncBar);

  function setMsg(t,cls){const m=$("agMsg");m.textContent=t;m.className="msg "+(cls||"");}
  function setSync(s){const b=$("syncBar");b.className="";if(s==="saving"){b.classList.add("saving");$("syncTxt").textContent="Sauvegarde…";}else if(s==="err"){b.classList.add("err");$("syncTxt").textContent="Hors ligne — non sauvegardé";}else{$("syncTxt").textContent="Synchronisé";}}

  $("agToggle").onclick=()=>{mode=(mode==="signin")?"signup":"signin";$("agBtn").textContent=(mode==="signin")?"Se connecter":"Créer le compte";$("agToggle").textContent=(mode==="signin")?"Pas encore de compte ? Créer un compte":"Déjà un compte ? Se connecter";setMsg("","");};

  $("agForm").onsubmit=async(e)=>{

      if(mode==="signup"){
        const {data,error}=await sb.auth.signUp({email,password:pass});
